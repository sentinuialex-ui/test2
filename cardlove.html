<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ของขวัญสุดพิเศษ!!</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    
    <style>
        :root {
            --primary: #ff6b95;
            --bg-dark: #0f0a14;
            --card-shadow: rgba(0, 0, 0, 0.4);
            --ease-bouncy: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top, #2b1222 0%, #0f0a14 70%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* พาร์ติเคิลวิบวับเป็นพื้นหลัง */
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* ส่วนหัวข้อและวันที่ */
        .header-section {
            text-align: center;
            margin-top: 6vh;
            z-index: 10;
            padding: 0 20px;
            animation: fadeInDown 1s ease forwards;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 2.2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #ffcbd1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
            line-height: 1.2;
        }

        .date-text {
            color: #ff6b95;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* โซนแสดงไพ่ (Poker Spread) */
        .cards-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin: 40px 0;
            min-height: 350px;
            perspective: 1000px;
        }

        .card {
            position: absolute;
            width: 200px;
            height: 290px;
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 15px 35px var(--card-shadow);
            cursor: pointer;
            transition: all 0.7s var(--ease-bouncy);
            transform-origin: bottom center;
            user-select: none;
            /* จุดเริ่มต้นคือซ้อนกันอยู่ตรงกลาง */
            transform: translate(0, 100px) rotate(0deg) scale(0.8);
            opacity: 0;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            pointer-events: none;
        }

        /* เอฟเฟกต์ตอนเอาเมาส์/นิ้วแตะไพ่ */
        .card:hover {
            transform: translateY(-40px) scale(1.1) rotate(0deg) !important;
            z-index: 100 !important;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 30px rgba(255, 107, 149, 0.5);
        }

        /* กล่องข้อความด้านล่าง */
        .message-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px 30px;
            width: 85%;
            max-width: 500px;
            text-align: center;
            margin-bottom: 5vh;
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: fadeInUp 1s 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-text {
            color: #e6d5eb;
            font-size: 1.05rem;
            line-height: 1.7;
            font-weight: 300;
        }

        /* Modal โชว์รูปใหญ่ */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 5, 12, 0.95);
            backdrop-filter: blur(10px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .modal.show { display: flex; opacity: 1; }

        .modal-content {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(255, 107, 149, 0.2);
            transform: scale(0.8) translateY(20px);
            transition: transform 0.5s var(--ease-bouncy);
            object-fit: contain;
        }

        .modal.show .modal-content { transform: scale(1) translateY(0); }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 35px;
            cursor: pointer;
            transition: 0.3s;
            width: 40px; height: 40px;
            display: flex; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .close-btn:hover { color: #fff; background: var(--primary); transform: rotate(90deg); }

        @media (max-width: 500px) {
            .card { width: 160px; height: 230px; }
            .title { font-size: 1.8rem; }
            .cards-wrapper { min-height: 280px; }
        }
    </style>
</head>
<body>

    <div id="particles"></div>

    <div class="header-section">
        <h1 class="title" id="displayTitle">Loading...</h1>
        <div class="date-text" id="displayDateContainer" style="display: none;">
            <span class="material-symbols-rounded" style="font-size: 18px;">calendar_heart</span>
            <span id="displayDate"></span>
        </div>
    </div>

    <div class="cards-wrapper" id="cardsWrapper">
        </div>

    <div class="message-box">
        <p class="msg-text" id="displayMsg"></p>
    </div>

    <div id="imageModal" class="modal">
        <div class="close-btn">&times;</div>
        <img id="modalImage" class="modal-content" src="">
    </div>

    <script>
        // ฟังก์ชันสร้างละอองดาวลอยๆ เป็นพื้นหลัง
        function createParticles() {
            const field = document.getElementById('particles');
            for(let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                const size = Math.random() * 4 + 1;
                p.style.cssText = `
                    position: absolute; width: ${size}px; height: ${size}px;
                    background: rgba(255, 180, 200, ${Math.random()}); border-radius: 50%;
                    left: ${Math.random() * 100}%; top: ${Math.random() * 100}%;
                    box-shadow: 0 0 ${Math.random() * 10}px rgba(255,107,149,0.5);
                `;
                field.appendChild(p);
                p.animate([ { transform: 'translateY(0)', opacity: 0.8 }, { transform: `translateY(-${Math.random() * 100 + 50}px)`, opacity: 0 } ], {
                    duration: 3000 + Math.random() * 4000, iterations: Infinity, delay: Math.random() * 2000
                });
            }
        }
        createParticles();

        // ------------------ ระบบถอดรหัสและแสดงผล ------------------
        const urlParams = new URLSearchParams(window.location.search);
        let title = "Surprise!";
        let msg = "ฉันมีของขวัญพิเศษให้คุณนะ";
        let date = "";
        let imgs = [];

        // ถอดรหัสข้อความ
        if (urlParams.has('q')) {
            try {
                const decodedJson = LZString.decompressFromEncodedURIComponent(urlParams.get('q'));
                const data = JSON.parse(decodedJson);
                title = data.t || title;
                msg = data.m || msg;
                date = data.d || "";
                imgs = data.imgs || [];
            } catch (e) {
                console.error("ถอดรหัสผิดพลาด", e);
            }
        }

        // นำข้อความไปใส่ใน HTML
        document.getElementById('displayTitle').innerHTML = title.replace(/\n/g, '<br>');
        document.getElementById('displayMsg').innerHTML = msg.replace(/\n/g, '<br>');
        
        if (date) {
            document.getElementById('displayDateContainer').style.display = 'flex';
            document.getElementById('displayDate').innerText = date;
        }

        // ถ้าผู้ใช้ไม่ได้ใส่รูปลงมาเลย ให้ใส่รูป Placeholder น่ารักๆ ไว้กันพัง 1 ใบ
        if (imgs.length === 0) {
            imgs.push('https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&q=80&w=400');
        }

        const cardsWrapper = document.getElementById('cardsWrapper');

        // สร้างไพ่และการกระจายตัว (Card Spread)
        imgs.forEach((imgUrl, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            // ใส่ภาพและกันเหนียวเผื่อลิ้งก์ตาย
            card.innerHTML = `<img src="${imgUrl}" onerror="this.src='https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=400'">`;
            
            // คำนวณองศาการกาง (Spread Calculation)
            const total = imgs.length;
            let angle = 0;
            let xOffset = 0;
            let yOffset = 0;

            if (total > 1) {
                const maxAngle = 50; // ความกว้างของพัด (องศา)
                const step = maxAngle / (total - 1);
                angle = - (maxAngle / 2) + (step * index);
                xOffset = angle * 2.2; // ระยะห่างซ้ายขวา
                yOffset = Math.abs(angle) * 1.5; // โค้งลงด้านล่างให้เป็นรูปพัด
            }
            
            // ตั้งค่า Z-index ให้ใบขวาทับซ้าย
            card.style.zIndex = index + 10;

            // เอาไพ่ใส่จอ
            cardsWrapper.appendChild(card);

            // หน่วงเวลาให้ดูเหมือนไพ่ค่อยๆ แจก (Animation)
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = `translate(${xOffset}px, ${yOffset}px) rotate(${angle}deg) scale(1)`;
            }, 300 + (index * 150)); // ค่อยๆ โผล่ทีละใบ

            // สั่งเปิดรูปใหญ่เมื่อกด
            card.addEventListener('click', () => {
                openModal(imgUrl);
            });
        });

        // ------------------ ระบบ Modal ปิด/เปิดรูปภาพ ------------------
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        const closeBtn = document.querySelector('.close-btn');

        function openModal(src) {
            modalImg.src = src;
            modal.classList.add('show');
        }

        function closeModal() {
            modal.classList.remove('show');
            setTimeout(() => { modalImg.src = ''; }, 400); // เคลียร์รูประหว่างปิด
        }

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal(); // กดพื้นที่ดำๆ เพื่อปิด
        });
    </script>
</body>
</html>
